# OpenE2EE — mobile/android/gradle/wrapper/gradle-wrapper.properties
#
# PR-28 (Sprint 5) — first committed Gradle wrapper configuration.
#
# Sprint 9.6.3 hotfix: bumped from Gradle 8.5 → Gradle 8.10 LTS.
# Sprint 9.6.4 hotfix: bumped from Gradle 8.10 → Gradle 8.14 LTS.
#
# Sprint 9.6.3 reason: Sprint 9.6.2 fix made `flutter_tools/gradle`
# resolve correctly (PATH-based `which flutter` derivation +
# flutter-version pin), but the live workflow_dispatch run AFTER
# Sprint 9.6.2 PR #14 push failed at
# `mobile/android/app/build.gradle.kts:80` with "Gradle 8.5 < 8.7".
#
# Sprint 9.6.4 reason: Sprint 9.6.3 cherry-pick passed `:gradle:jar`
# (Gradle 8.10 downloaded) but Flutter emitted a deprecation warning:
#
#   Warning: Flutter support for your project's Gradle version (8.10.0)
#            will soon be dropped. Please upgrade your Gradle version
#            to a version of at least 8.14.0 soon.
#
# Then failed at AGP version check:
#   "Your project's Android Gradle Plugin version (8.1.4) is lower
#    than Flutter's minimum supported version of Android Gradle Plugin
#    version 8.6.0."
#
# Flutter SDK 3.44.1 (project-wide pin via env.FLUTTER_VERSION in
# all 4 workflows) requires AGP >= 8.6.0 + Gradle >= 8.7.0 + warning
# prefers Gradle >= 8.14.0. We picked 8.14 LTS for stability —
# supports Gradle LTS through 2026, compatible with AGP 8.6/8.7/8.10.
#
# When the developer runs `gradle wrapper` for the first time, the
# `gradle-wrapper.jar` binary is downloaded next to this file. The jar
# IS committed in this repo (Sprint 9.5 committed Gradle 8.5 wrapper;
# Sprint 9.6.3 updated to Gradle 8.10; Sprint 9.6.4 updates to
# Gradle 8.14) — CI runners need the jar pre-staged so they don't
# need network access to download it.
#
# See `tools/workflow-yaml-audit.py` invariant check for the Gradle
# version floor (>= 8.7.0) and AGP version floor (>= 8.6).
#
# distributionBase / distributionPath control where the wrapper caches
# the Gradle distribution. `GRADLE_USER_HOME` is the default; setting it
# to GRADLE_USER_HOME means the same cached distribution is shared
# across every project on the developer machine.

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.14-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists