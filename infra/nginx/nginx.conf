events {
    worker_connections 1024;
}

http {
    upstream e2ee_backend {
        server backend:8080;
    }

    # HTTP -> HTTPS redirect (prod only)
    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://e2ee_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server (prod with Let's Encrypt)
    #
    # Cert path convention: /etc/letsencrypt/live/<domain>/
    # Matches:
    #   - infra/docker-compose.yml nginx volumes (certbot_data:/etc/letsencrypt:ro)
    #   - infra/coturn/turnserver.conf (commented example)
    #   - certbot standard output layout
    # Domain default: opene2ee.local (see infra/.env.example DOMAIN).
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/opene2ee.local/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/opene2ee.local/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass http://e2ee_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}