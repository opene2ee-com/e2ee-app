# ============================================================================
# Coturn TURN/STUN Server Configuration — OpenE2EE
# ----------------------------------------------------------------------------
# Bu dosya /etc/coturn/turnserver.conf olarak mount edilir (RO).
# Üretimde ${COTURN_PUBLIC_IP}, ${COTURN_REALM}, ${COTURN_STATIC_SECRET}
# docker-compose üzerinden env ile override edilir (bkz. docker-compose.yml).
#
# RFC referansları:
#   - RFC 5766  TURN  (Traversal Using Relays around NAT)
#   - RFC 5780  STUN  (Session Traversal Utilities for NAT)
#   - RFC 6062  TURN-over-TCP
#   - RFC 6156  IPv6 extension for TURN
#   - RFC 8656  TURN (obsoletes 5766)
#
# WebRTC için STUN + TURN zorunlu (peer-to-peer NAT traversal).
# ============================================================================

# ----------------------------------------------------------------------------
# Listening ports & network
# ----------------------------------------------------------------------------
# TURN port (UDP+TCP) — STUN da aynı porttan hizmet verir (multiplex)
listening-port=3478

# TURN-over-TLS port (5349)
# Üretimde --no-tls kaldırılarak etkinleştirilir (compose command override).
# tls-listening-port=5349

# TURN-over-DTLS port (UDP üzerinden DTLS, RFC 6347)
# Üretimde --no-dtls kaldırılarak etkinleştirilir (compose command override).
# dtls-listening-port=5349

# Relay port aralığı (peer bağlantıları için)
min-port=49152
max-port=65535

# ----------------------------------------------------------------------------
# Auth — REST API time-limited credentials (önerilen)
# ----------------------------------------------------------------------------
# Mobile client TURN REST API'ye bir nonce + HMAC-SHA1(username, password)
# ile credential alır. password = base64(HMAC-SHA1(static-auth-secret, username))
# (bkz. mobile/lib/shared/turn_credentials.dart — Sprint 2'de).
#
# static-auth-secret docker-compose'tan gelir (COTURN_STATIC_SECRET env).
# Üretimde openssl rand -hex 32 ile üretilir.

# use-auth-secret — REST API credentials modu
# static-auth-secret — bu dosyada BOŞ bırakılır; compose CMD ile inject edilir
# (bkz. coturn service definition: --static-auth-secret=${COTURN_STATIC_SECRET})

# ----------------------------------------------------------------------------
# Realm & fingerprint
# ----------------------------------------------------------------------------
# Realm — STUN/TURN kullanıcı adı realm'i (RFC 5389/5766)
# Prod'da opene2ee.com; dev'de opene2ee.local.
# realm — compose CMD ile inject edilir (--realm=${COTURN_REALM})

# Fingerprint — STUN mesajlarında FINGERPRINT attribute zorunlu (RFC 5389 §15.5)
fingerprint

# ----------------------------------------------------------------------------
# Security hardening
# ----------------------------------------------------------------------------
# STUN nonce süresi (saniye) — replay saldırılarına karşı
stale-nonce=600

# Multicast peer'lar reddedilir (P2P relay için gereksiz)
no-multicast-peers

# Loopback peer'lar reddedilir (loopback yönlendirme saldırılarına karşı)
no-loopback-peers

# TCP relay kapat — TCP üzerinden relay yalnızca TLS/DTLS ile mümkün (RFC 6062).
# Bu, "plain TCP without TLS" relay şemasını devre dışı bırakır (SCA-22).
# NOT: WebRTC "tcp-turn" candidate'ı kullanırsa TLS üzerinden açılabilir.
no-tcp-relay

# CLI yok (uzak yönetim saldırı yüzeyini azaltır)
no-cli

# ----------------------------------------------------------------------------
# TLS / DTLS — ÜRETİM YAPILANDIRMASI (Sprint 7 SCA-22)
# ----------------------------------------------------------------------------
# Bu blok üretimde --no-tls / --no-dtls kaldırıldığında aktiftir.
# Dev ortamında cert olmadığından --no-tls --no-dtls zorunlu (compose CMD).
#
# Sertifika kaynağı:
#   - Let's Encrypt (certbot, HTTP-01 challenge)
#   - VEYA kurumsal CA (internal PKI)
# Self-signed sertifika KULLANILMAZ — mobil istemci sertifika doğrulaması
# başarısız olur ve WebRTC bağlantısı kurulamaz (browser console'da
# "DTLS handshake failure").
#
# Cert paths — docker-compose certbot_data volume'unu /etc/coturn/certs
# olarak RO mount eder. Certbot standard layout:
#   /etc/coturn/certs/live/<domain>/fullchain.pem
#   /etc/coturn/certs/live/<domain>/privkey.pem
# Domain compose COTURN_TLS_DOMAIN env'inden gelir (prod: opene2ee.com).
#
# Cert rotation: certbot --renew-certs + Coturn SIGHUP (aşağıya bakın).
# ----------------------------------------------------------------------------

# Cert / private key — üretimde aktifleştirilir
# cert=/etc/coturn/certs/live/${COTURN_TLS_DOMAIN}/fullchain.pem
# pkey=/etc/coturn/certs/live/${COTURN_TLS_DOMAIN}/privkey.pem

# NO-TLS / NO-DTLS — üretimde bu satırlar compose command'ında YOKTUR.
# Config dosyasında da default olarak kapalı (dev uyumluluğu).
no-tls
no-dtls

# ----------------------------------------------------------------------------
# Cipher list — TLS 1.2+ ZORUNLU (SCA-22)
# ----------------------------------------------------------------------------
# Üretimde --no-tls kaldırıldığında bu cipher listesi kullanılır.
# Mozilla "intermediate" profilinden uyarlanmış — TLS 1.2+ only.
# NOT: Coturn cipher-list direktifi hem TLS hem DTLS için geçerlidir.
#
# İçerik:
#   ECDHE+AESGCM / ECDHE+CHACHA20  — forward secrecy (PFS)
#   DHE+AESGCM                     — PFS fallback (ECDHE yoksa)
#   !aNULL  — anonymous auth yok (MITM koruması)
#   !MD5, !3DES, !RC4, !DES        — zayıf/broken cipher'lar yok
#   !EXPORT, !LOW                  — export-grade cipher yok
#   !TLSv1, !TLSv1.1               — TLS 1.0/1.1 explicit devre dışı
#   !ECDSA                         — mobile cert zinciri genelde RSA, ECDSA
#                                    destekli değil; kapatmak daha güvenli
# cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!3DES:!RC4:!DES:!EXPORT:!LOW:!TLSv1:!TLSv1.1"
# Üretimde cipher-list aktifleştirilir (compose command ile override).

# TLS versiyon kısıtı — ek savunma katmanı (OpenSSL cipher string
# !TLSv1/!TLSv1.1 yeterli olsa da Coturn'a özel no-tlsv1* direktifleri
# ayrı bir guardrail sağlar; doğrudan handshake reddi).
# no-tlsv1
# no-tlsv1_1

# SSLv2/SSLv3 zaten OpenSSL 1.0+ ile default kapalı; açıkça kapat:
no-sslv2
no-sslv3

# ----------------------------------------------------------------------------
# Sıkılaştırma — "plain UDP/TCP without DTLS" (SCA-22)
# ----------------------------------------------------------------------------
# Coturn tek bir UDP listener'da hem STUN (RFC 5389) hem plain TURN
# (RFC 5766) hem DTLS'i aynı port üzerinden sunabilir. "Plain UDP
# without DTLS" TURN trafiğini kapatmak için aşağıdaki guard'lar uygulanır:
#
#   1) no-tcp-relay (yukarıda) — TCP relay yalnızca TLS üzerinden (RFC 6062)
#   2) no-udp-relay YOK — UDP relay DTLS ile kullanılır (RFC 5764/7346);
#      plain UDP relay zaten WebRTC DTLS-SRTP katmanı tarafından zorunlu
#      kılınır, Coturn tarafında ek guard:
#   3) Mobile config: stun-only 3478/udp, turn 5349/tls (TURNS) veya
#      5349/dtls (DTLS) kullanır. Plain "turn:" (UDP/TCP) URI KULLANILMAZ.
#   4) Üretimde --no-tls --no-dtls komutları KALDIRILIR — bu devre dışı
#      bırakıldığında 3478/udp yalnızca STUN, 5349/tcp TLS, 5349/udp DTLS
#      hizmet verir; plain TURN aktif değildir.
#
# Client tarafı doğrulama: scripts/smoke/coturn-tls.sh (TLS 1.0/1.1 reject
# + TLS 1.2 accept + cert subject/issuer check).
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
# stdout — docker logs tarafından yakalanır
log-file=stdout
# Verbosity (0-7). 4 normal; 6 verbose debug için.
verbose=4
# Syslog yok (container'da syslog yok)
no-syslog
# Simple log — JSON değil, ama yeterli
simple-log

# ----------------------------------------------------------------------------
# Process model & misc
# ----------------------------------------------------------------------------
# PID file (container'da anlamsız ama Coturn kontrol etmek ister)
# pidfile=/var/run/turnserver.pid

# Mobil uygulama için STUN sorgu optimizasyonu
# mobility-timers

# IPv6 dinleme (üretimde açılabilir)
# no-ipv6

# ============================================================================
# Sprint 7 (SCA-22) notları:
# - Üretimde --no-tls --no-dtls kaldırılır; cert/pkey + cipher-list aktif.
# - Cert rotation: certbot renew (cron 60 gün) → docker kill -s HUP coturn
#   (Coturn SIGHUP ile TLS context'i reload eder; active session'lar korunur).
# - Mobile client config (Sprint 2 turn_credentials.dart) prod'da
#   turns:turn.opene2ee.com:5349 veya turn+dtls://turn.opene2ee.com:5349
#   kullanır; plain turn:// KULLANILMAZ.
# ============================================================================

# ============================================================================
# Sprint 1 notları:
# - userdb yok — REST API credentials kullanılır (no-auth mode değil)
# - auth-secret tek bir static key; Sprint 2'de per-user ephemeral credential
#   üretilecek (mobile client -> backend -> coturn).
# - Allowed peer IP: docker-compose CMD'inden inject edilir
#   (--allowed-peer-ip=${COTURN_PUBLIC_IP}).
# ============================================================================