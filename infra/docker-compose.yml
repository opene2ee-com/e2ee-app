# ============================================================================
# OpenE2EE — Development Docker Compose
# ----------------------------------------------------------------------------
# Sprint 1 (HANDOFF.md §4.3 PR-13) — local dev ortamı.
#
# Servisler (default profile):
#   postgres     PostgreSQL 16 + TimescaleDB extension (internal network)
#   redis        Redis 7 (internal network, Active Pool + rate-limit cache)
#   backend      OpenE2EE Go backend (REST + WebSocket)
#   kong         Kong Gateway 3.x DB-less (TLS termination, rate-limit, CORS)
#   coturn       Coturn TURN/STUN (public UDP/TCP bypass, WebRTC relay)
#
# Profiles (alternative):
#   nginx        --profile nginx     Nginx reverse proxy (Kong yerine)
#
# Networks (HANDOFF §4.3):
#   internal     sadece postgres + redis (DB seviyesi izolasyon)
#   external     kong + backend + coturn (external trafik + admin)
#
# Volumes:
#   postgres_data   Postgres + TimescaleDB data persistence
#   redis_data      Redis AOF persistence
#   kong_config     Kong declarative config (kong.yml) read-only mount
#   certbot_data    Let's Encrypt certs (prod); dev'de boş
#
# Çalıştırma:
#   cp infra/.env.example infra/.env  # secret'ları set et
#   docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
#
# Not: Bu makinede Docker kurulu olmayabilir (PR-13 varsayımı); runtime
# test Sprint 2 / CI'da. Bu dosya sadece `docker compose config` ile
# syntax doğrulaması içindir.
# ============================================================================

name: opene2ee

# ----------------------------------------------------------------------------
# x-anchors — DRY templates for repeated fields
# ----------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# ----------------------------------------------------------------------------
# Networks
# ----------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    name: opene2ee-internal
    ipam:
      config:
        - subnet: 172.30.0.0/24
  external:
    driver: bridge
    name: opene2ee-external
    ipam:
      config:
        - subnet: 172.31.0.0/24

# ----------------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: opene2ee-postgres-data
    driver: local
  redis_data:
    name: opene2ee-redis-data
    driver: local
  certbot_data:
    name: opene2ee-certbot-data
    driver: local
  certbot_www:
    name: opene2ee-certbot-www
    driver: local
  coturn_data:
    name: opene2ee-coturn-data
    driver: local
  backend_logs:
    name: opene2ee-backend-logs
    driver: local

# ----------------------------------------------------------------------------
# Secrets — DOSYA tabanlı (production tavsiye edilen yol)
# ----------------------------------------------------------------------------
# Dev ortamı .env ile yeterli (environment: blokları ${VAR} ile çeker).
# Üretimde docker secrets (file provider) tercih edilir:
#   1. mkdir -p ../.secrets
#   2. openssl rand -hex 32 > ../.secrets/postgres_password.txt
#   3. openssl rand -hex 32 > ../.secrets/redis_password.txt
#   4. openssl rand -hex 32 > ../.secrets/server_salt.txt
#   5. openssl rand -hex 32 > ../.secrets/coturn_static_secret.txt
# .gitignore zaten *.txt / *.pem / secrets/ ignore eder.
# Bu blok opsiyoneldir — servisler *_FILE değişkenlerine geçirilerek
# etkinleştirilir (aşağıdaki service definition'lara bakın).
secrets:
  postgres_password:
    file: ../.secrets/postgres_password.txt
  redis_password:
    file: ../.secrets/redis_password.txt
  server_salt:
    file: ../.secrets/server_salt.txt
  coturn_static_secret:
    file: ../.secrets/coturn_static_secret.txt

# ============================================================================
# Services
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 + TimescaleDB extension
  # --------------------------------------------------------------------------
  # ADR-0007 §Servisler; internal-only (sadece backend ile konuşur).
  # TimescaleDB extension otomatik yüklenir (image içinde var).
  # seed.sql volume mount ile ilk başlatmada otomatik çalıştırılır.
  # --------------------------------------------------------------------------
  postgres:
    <<: *default-restart
    image: timescale/timescaledb-ha:pg16
    container_name: opene2ee-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opene2ee}
      POSTGRES_USER: ${POSTGRES_USER:-opene2ee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli (bkz infra/.env.example)}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # TimescaleDB tuning
      TS_TUNE_MEMORY: "2GB"
      TS_TUNE_NUM_CPUS: "2"
    volumes:
      - postgres_data:/home/postgres/pgdata/data:Z
      # seed.sql ilk başlatmada otomatik çalıştırılır.
      # Container zaten initialize edilmişse bu dosya atlanır (initdb idempotent değil).
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    networks:
      - internal
    # Internal-only — host'tan direkt erişim yok (compose restart ile yine
    # de açılabilir; üretimde ağ policy ile sıkılaştırılacak).
    expose:
      - "5432"
    ports:
      # Sadece dev için host'a aç (debug/psql); üretimde kaldırılacak.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opene2ee} -d ${POSTGRES_DB:-opene2ee}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # --------------------------------------------------------------------------
  # Redis 7 — Active Pool (PR-6 matching) + cache
  # --------------------------------------------------------------------------
  # AOF (Append-Only File) persistence: every second fsync.
  # Internal-only.
  #
  # Sprint 7 PR-43 (SEC-6/7): REDIS_PASSWORD is now REQUIRED (fail-closed)
  # — `${REDIS_PASSWORD:?...}` expansion. Previously the redis container
  # started with --protected-mode no and no --requirepass, exposing an
  # unauthenticated cache on the docker bridge. Now:
  #   --protected-mode yes  (default; explicit)
  #   --requirepass X       (X = $REDIS_PASSWORD, same as backend's)
  # Backend is also updated to consume the same REDIS_PASSWORD env (see
  # the backend service above). Host port mapping is removed so the
  # container is internal-only (the only access path is via the `internal`
  # docker network). To debug from the host with `redis-cli`, prefer the
  # `docker compose exec redis redis-cli -a "$REDIS_PASSWORD"` pattern.
  # --------------------------------------------------------------------------
  redis:
    <<: *default-restart
    image: redis:7-alpine
    container_name: opene2ee-redis
    hostname: redis
    # REDIS_PASSWORD is required by both --requirepass below AND the
    # backend service's REDIS_PASSWORD env. Compose :? expansion fails
    # the stack at startup if either is unset.
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD gerekli (bkz infra/.env.example — openssl rand -hex 32)}"
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-256mb}"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - "900 1"
      - "--save"
      - "300 10"
      # NB: --bind keeps 0.0.0.0 because backend talks to redis via
      # the docker bridge NIC (172.30.0.x). True bind 127.0.0.1 would
      # require network_mode: host for the redis service AND a
      # topology rewrite — out of scope for SEC-6/7. Equivalent
      # security: --protected-mode yes + --requirepass + no host
      # port mapping (below) + internal-only network.
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "yes"
      # Sprint 7 PR-43 (SEC-6/7): --requirepass is required. Auth is
      # enforced — clients (backend's Redis client) MUST `AUTH` with
      # the matching REDIS_PASSWORD before any non-AUTH command.
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD gerekli (bkz infra/.env.example — openssl rand -hex 32)}"
    volumes:
      - redis_data:/data
    networks:
      - internal
    expose:
      - "6379"
    # Sprint 7 PR-43 (SEC-6/7): host port mapping removed by default
    # (no `ports:` block) so the container is internal-only. To debug
    # from the host: `docker compose exec redis redis-cli -a "$REDIS_PASSWORD"`.
    # If a host port mapping is genuinely needed for an external client,
    # document the justification in infra/README.md and add back the
    # mapping with a non-default REDIS_HOST_PORT.
    healthcheck:
      # Use `-a` to pass the same REDIS_PASSWORD — required now that
      # --requirepass is enforced (Sprint 7 PR-43). Without `-a`,
      # `redis-cli ping` would fail with NOAUTH and crash the healthcheck.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # OpenE2EE Backend — Go HTTP server (PR-8 wire-up)
  # --------------------------------------------------------------------------
  # Backend/.dockerignore yok (gerekirse eklenir); Dockerfile ./backend altında.
  # Build context: bir üst dizin (compose -f infra/docker-compose.yml kullanılırken).
  # --------------------------------------------------------------------------
  backend:
    <<: *default-restart
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: opene2ee-backend:dev
    container_name: opene2ee-backend
    hostname: backend
    environment:
      # Backend'in env contract'ı: backend/cmd/server/main.go (PR-8)
      SERVER_PORT: "${SERVER_PORT:-8080}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-opene2ee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opene2ee}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      # REDIS_PASSWORD — Sprint 7 PR-43 (SEC-6/7). The backend's
      # REDIS_PASSWORD MUST match the one the redis container is
      # started with (see the redis service below:
      # `--requirepass ${REDIS_PASSWORD:?...}`). :? = required;
      # both the redis server AND the backend's Go client
      # (redis.Connect in cmd/server/main.go) fail closed when
      # this is unset. Match the Sprint 5 PR-32 JWT_SECRET
      # fail-closed posture (ADV-3).
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD gerekli (bkz infra/.env.example — openssl rand -hex 32)}"
      SERVER_SALT: "${SERVER_SALT:?SERVER_SALT gerekli (32+ char önerilir)}"
      # JWT_SECRET — Sprint 5 PR-32 (ADV-3). Shared HS256 secret
      # used by the Go backend's auth.IssueJWT (POST /api/v1/auth)
      # AND by the IsAuthorized middleware on protected routes.
      # MUST match the JWT_SECRET Kong is started with — the Kong
      # JWT plugin references it via {vault://env/jwt-secret} in
      # infra/kong/kong.yml. :? = required; the backend fails
      # closed (login returns 500, protected routes 401) when
      # JWT_SECRET is empty.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET gerekli (HS256 shared secret, Kong + backend)}"
      SHUTDOWN_TIMEOUT_SEC: "${SHUTDOWN_TIMEOUT_SEC:-30}"
      HEALTHCHECK_TIMEOUT_MS: "${HEALTHCHECK_TIMEOUT_MS:-2000}"
      # Log seviyesi (opsiyonel)
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Backend logları host'tan da erişilebilir olsun
      - backend_logs:/var/log/opene2ee
    networks:
      - internal
      - external
    # Host'a açmayız — sadece Kong üzerinden erişilir.
    # Dev için istersen expose edebilirsin; default'ta external network üzerinden
    # Kong -> backend:8080 path yeterli.
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    # Restart policy: backend crash olursa postgres/redis hazır olduğunda
    # otomatik ayağa kalksın; depends_on bunu zaten sağlar.
    stop_grace_period: 30s

  # --------------------------------------------------------------------------
  # Kong Gateway 3.x (DB-less / declarative)
  # --------------------------------------------------------------------------
  # ADR-0007 §Kong Konfigürasyonu. kong.yml declarative config repo'da
  # versiyonlanır (GitOps). KONG_DATABASE=off + KONG_DECLARATIVE_CONFIG
  # otomatik yüklenir.
  # --------------------------------------------------------------------------
  kong:
    <<: *default-restart
    image: kong:3.8-alpine
    container_name: opene2ee-kong
    hostname: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/etc/kong/kong.yml"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      KONG_LOG_LEVEL: "${KONG_LOG_LEVEL:-info}"
      KONG_PLUGINS: "bundled,cors,prometheus,bot-detection,rate-limiting,jwt"
      KONG_NGINX_WORKER_PROCESSES: "2"
      # Dev modunda CORS preflight vb. serbest; üretimde kapatılır.
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      # JWT_SECRET — Sprint 5 PR-32 (ADV-3). The Kong JWT plugin
      # references this via the bundled `env` vault
      # ({vault://env/jwt-secret} in infra/kong/kong.yml). MUST
      # match the JWT_SECRET the backend is started with.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET gerekli (HS256 shared secret, Kong + backend)}"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - external
    ports:
      - "${KONG_PROXY_HTTP_PORT:-8000}:8000"
      - "${KONG_PROXY_HTTPS_PORT:-8443}:8443"
      # Admin API — sadece dev için host'a açık; üretimde internal-only olmalı.
      - "${KONG_ADMIN_PORT:-8001}:8001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # Coturn TURN/STUN server
  # --------------------------------------------------------------------------
  # RFC 5766 (TURN) + RFC 5389 (STUN). WebRTC için public UDP/TCP relay.
  # Kong Bypass — HTTP proxy'lerden geçemez (UDP).
  # Dış portlar doğrudan host'a açılır.
  #
  # Sprint 7 SCA-22 — TLS/DTLS production config (hand-off from
  # cyber-security). COTURN_TLS_ENABLED=true olduğunda:
  #   - --no-tls --no-dtls komutları kaldırılır
  #   - 5349/tcp (TURNS) + 5349/udp (DTLS) portları host'a açılır
  #   - certbot_data volume /etc/coturn/certs olarak mount edilir (RO)
  #   - cert/pkey + cipher-list turnserver.conf'tan aktifleşir
  #   - Mobile client turns://turn.opene2ee.com:5349 (TLS) veya
  #     turn+dtls://turn.opene2ee.com:5349 (DTLS) URI kullanır
  # Dev'de COTURN_TLS_ENABLED unset/false → mevcut davranış (plain UDP/TCP
  # STUN-only, sertifika gerektirmez) korunur.
  # --------------------------------------------------------------------------
  coturn:
    <<: *default-restart
    image: coturn/coturn:4.6
    container_name: opene2ee-coturn
    hostname: coturn
    # network_mode: host KULLANMA — external bridge ağ üzerinden gidelim
    # ki docker DNS / healthcheck çalışsın. Prod'da net=host + firewall tercih edilir.
    # Sprint 7 SCA-22 — entrypoint script COTURN_TLS_ENABLED env'ine göre
    # dev/prod komut ayarlarını kurar (--no-tls/--no-dtls vs --tls/--dtls +
    # cert/pkey + cipher-list). Detay: infra/coturn/entrypoint.sh.
    command: ["/etc/coturn/entrypoint.sh"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./coturn/entrypoint.sh:/etc/coturn/entrypoint.sh:ro
      - coturn_data:/var/lib/coturn
      # Certbot volume mount — RO. Üretimde certbot standard layout'a
      # göre /etc/coturn/certs/live/${COTURN_TLS_DOMAIN}/ altında cert'leri
      # bulur. Dev'de certbot_data boş olduğundan COTURN_TLS_ENABLED=false
      # kalır ve entrypoint --no-tls --no-dtls modunda başlatır.
      - certbot_data:/etc/coturn/certs:ro
    networks:
      - external
    ports:
      # STUN/TURN UDP+TCP (RFC 5766) — plain (SCA-22: dev fallback)
      - "${COTURN_LISTEN_PORT:-3478}:3478/udp"
      - "${COTURN_LISTEN_PORT:-3478}:3478/tcp"
      # Port range for relay
      - "${COTURN_MIN_PORT:-49152}-${COTURN_MAX_PORT:-65535}:${COTURN_MIN_PORT:-49152}-${COTURN_MAX_PORT:-65535}/udp"
      # Sprint 7 SCA-22 — TURN-over-TLS (5349/tcp) + TURN-over-DTLS (5349/udp).
      # Üretimde COTURN_TLS_ENABLED=true olduğunda entrypoint Coturn'u
      # --tls --dtls ile başlatır ve bu portlar dinlenir. Dev'de unset → false
      # → portlar host'a expose edilse bile Coturn listener'ı yok (unreachable,
      # ancak healthcheck UDP 3478'i kullanır — fail olmaz).
      - "${COTURN_TLS_PORT:-5349}:5349/tcp"
      - "${COTURN_TLS_PORT:-5349}:5349/udp"
    environment:
      # Sprint 7 SCA-22 — TLS gate.
      # Dev:  unset veya "false" → --no-tls --no-dtls
      # Prod: "true" → --tls --dtls + cert/pkey + cipher-list (TLS 1.2+ only)
      COTURN_TLS_ENABLED: "${COTURN_TLS_ENABLED:-false}"
      COTURN_TLS_DOMAIN: "${COTURN_TLS_DOMAIN:-${DOMAIN:-opene2ee.local}}"
      COTURN_TLS_CERTDIR: "${COTURN_TLS_CERTDIR:-/etc/coturn/certs}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z -u 127.0.0.1 ${COTURN_LISTEN_PORT:-3478} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # Nginx — alternatif reverse proxy (Kong yerine)
  # --------------------------------------------------------------------------
  # Sadece --profile nginx ile başlatılır.
  # Kong + Nginx aynı anda çalışmaz (port çakışması).
  # --------------------------------------------------------------------------
  nginx:
    <<: *default-restart
    image: nginx:alpine
    container_name: opene2ee-nginx
    hostname: nginx
    profiles:
      - nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt cert'leri (prod); dev'de boş.
      # certbot_data mounts to /etc/letsencrypt — certbot standard layout
      # writes certs to /etc/letsencrypt/live/<domain>/{fullchain,privkey}.pem.
      # Must match ssl_certificate / ssl_certificate_key paths in
      # infra/nginx/nginx.conf and infra/nginx/README.md.
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - external
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Sprint 7 AUTHZ-2 — /healthz is JWT-protected at Kong (per
      # infra/kong/kong.yml `healthz` route). The nginx container
      # has no JWT credential, so we ping the backend directly via
      # the internal Docker network (`backend:8080/healthz`) to
      # confirm upstream reachability. External probes must present
      # a JWT (see infra/kong/README.md §"Health Check").
      test: ["CMD-SHELL", "wget -qO- http://backend:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

# ============================================================================
# Default + Profile compose notes
# ============================================================================
# Kong ile Nginx aynı anda çalıştırma — port 80/443 çakışır.
# Kong default:  docker compose -f infra/docker-compose.yml up -d
# Nginx alternatifi: docker compose -f infra/docker-compose.yml --profile nginx up -d
# ============================================================================