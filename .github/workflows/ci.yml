name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.44.1"
  GO_VERSION: "1.22"

jobs:
  # ============================================================================
  # Multi-OS matrix — Sprint 3 PR-MP-CI
  # ----------------------------------------------------------------------------
  # Per-OS coverage (ADR-0008 / SPRINT-3-SCOPE §5 / docs/CI-MATRIX.md):
  #   1. Go build + test         — 3 OSes (ubuntu + macos + windows)
  #   2. Flutter analyze + test  — 3 OSes
  #   3. Docker compose config   — 2 OSes (Linux + macOS; Windows skip —
  #                                 see docker-compose-config job below
  #                                 for the explicit STRIDE-8-02 NOTICE)
  #   4. Privacy spot-check      — 3 OSes (KVKK DELETE handler +
  #                                 privacy invariant tests)
  #
  # Total matrix fan-out: 11 legs (3+3+2+3) per workflow run.
  #
  # Windows docker skip — Sprint 7 STRIDE-8-02:
  #   All docker-touching jobs in this workflow (docker-compose-config,
  #   backend-build) are EXPLICITLY Windows-skipped. Rationale is
  #   documented inline at each job AND in docs/CI-MATRIX.md §"Windows
  #   docker skip rationale". DO NOT re-add windows-latest to either
  #   matrix without first updating the CI-MATRIX doc and consulting
  #   Docker Desktop limitations (https://docs.docker.com/desktop/why/
  #   #limitations-of-docker-for-windows).
  # ============================================================================

  go-build-test:
    name: Go — vet + build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: opene2ee_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opene2ee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: opene2ee_test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: opene2ee_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}

      - name: Install deps
        run: go mod download

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready"
          exit 1

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # No -race: cross-OS matrix is hermetic-friendly; -race is
        # exercised by the dedicated `go-test-race` job on Linux
        # only (Sprint 5 PR-31). The matrix's job is to confirm
        # the suite PASSES on all 3 runners with the same source.
        run: go test -count=1 ./...

  flutter-analyze-test:
    name: Flutter — analyze + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  docker-compose-config:
    name: Docker compose config (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ----------------------------------------------------------------
        # NOTICE — Sprint 7 STRIDE-8-02 (Windows docker skip):
        #   windows-latest is INTENTIONALLY omitted from this matrix.
        #
        #   Why Windows is skipped:
        #     (a) infra/docker-compose.yml uses YAML anchors that Docker
        #         Compose for Windows handles, but the canonical
        #         `docker compose config` runtime dereferences POSIX-style
        #         secret file paths (`file: ../.secrets/<name>.txt` —
        #         L104-L110 of infra/docker-compose.yml) that fail
        #         Windows path translation. The pure-Python validator
        #         (`infra/scripts/validate_compose.py`) used in CI is
        #         OS-agnostic and would run fine on Windows, but the
        #         operational truth is that the real `docker compose
        #         config` invocation a developer would run locally is
        #         NOT reproducible on Windows without WSL.
        #     (b) Docker Desktop on Windows requires WSL 2 or Hyper-V
        #         and runs in a Linux VM — CI validation on
        #         ubuntu-latest + macos-latest is sufficient because
        #         both are native Linux/macOS Docker runtimes that
        #         match the production deployment target.
        #
        #   Manual docker verify on Windows:
        #     Developers on Windows who need to validate the compose
        #     stack MUST run from WSL 2 (see docs/MULTIPLATFORM.md §2.2).
        #     Git Bash alone is NOT sufficient — Docker Desktop's WSL
        #     integration is the only path that gives Linux-equivalent
        #     compose semantics.
        #
        #   See: docs/CI-MATRIX.md §"Windows docker skip rationale".
        # ----------------------------------------------------------------
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        # Sprint 7 / STRIDE-8-03: pyyaml version pinned. The tools/
        # validator (tools/ci-tools-pin-check.sh) refuses unpinned
        # `pip install` invocations. PyYAML 6.0.1 is the current
        # stable release on PyPI as of 2026-07-07.
        run: pip install pyyaml==6.0.1

      - name: Validate compose YAML
        # infra/scripts/validate_compose.py is the project's
        # pure-Python validator. It catches YAML syntax errors and
        # structural shape issues (services, networks, volumes,
        # secrets, depends_on, profiles) without requiring Docker.
        # The script is OS-agnostic — runs identically on Linux
        # and macOS. NOT equivalent to `docker compose config`
        # (no env-var expansion, no anchor resolution), but
        # sufficient as a CI gate.
        run: python infra/scripts/validate_compose.py

  privacy-check:
    name: Privacy — KVKK DELETE spot-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install deps
        run: go mod download

      - name: KVKK DELETE + privacy invariants
        # Focused hermetic test slice (no services required):
        #   - TestRouter_AllRoutesMounted includes a DELETE
        #     /api/v1/users/{hash} sub-test (router_test.go) that
        #     exercises the KVKK right-to-erasure handler against
        #     the in-process fake store and asserts the 200 +
        #     {deleted:true, device_id_hash:<hash>} response shape.
        #   - TestPrivacy_* guard rails in internal/auth
        #     (device_test.go) assert no raw key material is
        #     exported, no log leaks, hash/fingerprint are not
        #     reversible. Together these are the cross-OS
        #     spot-check that the KVKK privacy contract is
        #     intact on every runner.
        run: |
          go test -v -count=1 \
            -run 'TestRouter_AllRoutesMounted|TestPrivacy' \
            ./internal/api/... ./internal/auth/...

  # ============================================================================
  # PR-14 single-OS jobs (preserved for backwards compatibility)
  # ----------------------------------------------------------------------------
  # The matrix above supersedes these on Linux for the same
  # coverage. The single-OS jobs are kept so the Linux build
  # continues to exercise the legacy per-step gates (gofmt, docker
  # buildx, flutter build web, schema validation, markdown lint)
  # at the same SHA, which the matrix does not duplicate.
  # ============================================================================

  # ---------------------------------------------------------------------------
  # Backend (Go) — single-OS legacy
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend — go vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}

      - name: Install deps
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: gofmt check
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "gofmt issues:"
            echo "$output"
            exit 1
          fi

  backend-test:
    name: Backend — go test (race + cover)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: opene2ee_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opene2ee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: opene2ee_test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: opene2ee_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install deps
        run: go mod download

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do
            sleep 2
          done

      - name: Run tests
        run: go test -race -cover ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ---------------------------------------------------------------------------
  # Backend — govulncheck (Sprint 6 PR-38 — hand-off from cyber-security
  # review §2.1 SCA-1/2/3)
  # ---------------------------------------------------------------------------
  # Runs `govulncheck ./...` against the backend module and fails on
  # ANY known vulnerability. The canonical answer to "is pgx/v5 at
  # v5.10.0 still affected by CVE-2026-33816 / CVE-2024-27304 /
  # CVE-2024-27289?" — as of 2026-07-07, the answer is no (v5.10.0 is
  # post-patch for all three), and govulncheck@v1.5.0 (vuln DB
  # 2026-06-26) reports "No vulnerabilities found." against the
  # current backend. This job re-verifies that posture on every PR.
  #
  # Companion to backend/internal/storage/pgx_pin_test.go — that test
  # is the hermetic floor (no DB deps, no network), this job is the
  # canonical live scan (uses vuln.go.dev at runtime). Both must pass
  # for the security gate to be green.
  # ---------------------------------------------------------------------------
  backend-govulncheck:
    name: Backend — govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-govulncheck-${{ hashFiles('backend/go.sum') }}

      - name: Install govulncheck
        # Pinned at @latest for now — govulncheck releases are
        # backwards-compatible with the vuln DB schema; bump to a
        # concrete version once the project settles on a release
        # cadence (Sprint 7+).
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # `-show=verbose` prints every reached symbol with its vuln
        # status, so the run log answers "did govulncheck actually
        # walk the entry points?" in addition to the headline pass.
        # Default exit code is non-zero on any finding; CI fails the
        # job automatically. Uploads the JSON output as an artifact
        # so future audits can replay the exact vuln DB snapshot.
        run: |
          set -euo pipefail
          govulncheck -show=verbose ./... 2>&1 | tee govulncheck.log
          govulncheck -json ./... > govulncheck.json || true

      - name: Upload govulncheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-govulncheck
          path: |
            backend/govulncheck.log
            backend/govulncheck.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Backend — race detection (Sprint 5 PR-31)
  # ---------------------------------------------------------------------------
  # Folds out the `-race` portion of `backend-test` into its own
  # dedicated job so the race-detection signal is explicit in the
  # workflow UI and not bundled with the coverage run. Per Sprint 3
  # PR-21a verifier non-blocking follow-up: "TestManager_ConcurrentIceIsRaceFree
  # -race flag Linux CI'da". The matrix job (`go-build-test`) and
  # this job share the same go-test source; this one surfaces any
  # data races the matrix would miss (it does not enable -race for
  # hermetic-fast feedback).
  #
  # Why a dedicated job:
  #   - Race failures are loud (panic + stack); a dedicated job
  #     page is easier to triage than a coverage-upload failure
  #     that happens to be a race.
  #   - Some packages set GOMAXPROCS=1 in test helpers (the
  #     WebRTC concurrent ICE fuzz test, etc.). Running those
  #     under -race catches ordering bugs that the matrix
  #     `go test -count=1 ./...` can't see.
  #   - Ubuntu-only is intentional — `-race` uses thread-sanitiser
  #     runtime overhead which roughly doubles wall-clock time;
  #     doing it on Linux only keeps Windows/macOS matrix legs
  #     fast.
  # ---------------------------------------------------------------------------
  go-test-race:
    name: Backend — race detection (Ubuntu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: opene2ee_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opene2ee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: opene2ee_test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: opene2ee_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}

      - name: Install deps
        run: go mod download

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do
            sleep 2
          done

      - name: go test -race ./...
        # Sprint 5 PR-31: dedicated -race job for the WebRTC
        # state-machine tests (TestManager_ConcurrentIceIsRaceFree,
        # the FAILED_OFFER transition tests, etc.). The matrix
        # job runs `go test -count=1 ./...` WITHOUT -race so
        # Linux doesn't pay the 2x wall-time cost twice; this
        # job is the canonical -race gate. Override
        # GOMAXPROCS to 4 so multi-core race detection has
        # enough scheduling headroom on the github-hosted
        # ubuntu runners.
        env:
          GOMAXPROCS: 4
        run: go test -race -count=1 ./...

  backend-build:
    name: Backend — docker build
    # ----------------------------------------------------------------
    # NOTICE — Sprint 7 STRIDE-8-02 (Linux-only docker build):
    #   This job is HARD-PINNED to ubuntu-latest because backend
    #   Docker buildx invocation requires a Linux-compatible Docker
    #   daemon. GitHub-hosted Windows runners run Docker Desktop
    #   inside a WSL2-backed VM with a different BuildKit cache and
    #   overlay-driver profile; macOS runners use Docker Desktop's
    #   xhyve-based VM with separate cache scope. Building only on
    #   ubuntu-latest keeps the GHA cache layer (`cache-from:
    #   type=gha`) deterministic and matches the production target
    #   (Linux containers behind Kong/Nginx — see
    #   infra/docker-compose.yml services).
    #
    #   Re-adding a multi-OS build matrix here would NOT add signal
    #   — backend Dockerfile is debian-slim only (no Windows- or
    #   macOS-specific stages), so the only thing a multi-OS matrix
    #   would exercise is Docker Desktop itself, not our code.
    #
    #   See: docs/CI-MATRIX.md §"Windows docker skip rationale".
    # ----------------------------------------------------------------
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: opene2ee-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

  # ---------------------------------------------------------------------------
  # Mobile (Flutter) — single-OS legacy
  # ---------------------------------------------------------------------------
  mobile-analyze:
    name: Mobile — flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

  mobile-test:
    name: Mobile — flutter test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install deps
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info

  mobile-build-web:
    name: Mobile — flutter build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install deps
        run: flutter pub get

      - name: Build web
        run: flutter build web --target=lib/web/main.dart --release

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-build
          path: mobile/build/web
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Mobile (Flutter) — F1 anonimlik grep guard (Sprint 7 / Item 12)
  # ---------------------------------------------------------------------------
  # Hand-off origin: cyber-security review of PR-39 mobile security
  # hardening (Sprint 6) — the F1 anonimlik contract documented in
  # ADR-0006 §"Veri Minimizasyonu" requires that the mobile lib/test
  # source never re-introduces reads from `TelephonyManager`,
  # `getDeviceId`, IMEI, or `androidId`. PR-15 closed the immediate
  # violation; this CI job is the standing guard that prevents
  # regression.
  #
  # Why a dedicated Dart script (`tool/ci_grep_privacy_violations.dart`)
  # rather than `grep -rnE`:
  #   * Dart / Kotlin / Swift source needs Dart-aware stripping of
  #     comments and string literals so that the policy documentation
  #     (e.g. the RegExp in `mobile/test/shared/device_identity_test.dart`
  #     lines 245-249) does not trip the guard.
  #   * The script's output (`F1 anonimlik guard: IMEI/TelephonyManager
  #     usage detected — see ADR-0006`) is a deterministic, machine-
  #     parseable failure message that points reviewers at the right
  #     ADR on first failure.
  #
  # Ubuntu-only is intentional: the script depends only on the Dart
  # stdlib (`dart:io`, `dart:core`), which the Flutter setup action
  # provides on every runner. A matrix would not catch additional
  # bugs and would 3x the wall-clock cost.
  mobile-privacy-grep:
    name: Mobile — F1 anonimlik grep guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (for dart on PATH)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Run privacy violations grep guard
        # Sprint 7 / Item 12 (STRIDE-3-01) — F1 anonimlik CI guard.
        # Defaults scan `mobile/lib` and `mobile/test`. Exits non-zero
        # on ANY forbidden identifier surviving the comment / string-
        # literal strip, blocking the PR per ADR-0006.
        run: dart run tool/ci_grep_privacy_violations.dart

  # ---------------------------------------------------------------------------
  # CI tools — version pinning (Sprint 7 / STRIDE-8-03 — hand-off
  # from cyber-security review).
  # ---------------------------------------------------------------------------
  # Runs tools/ci-tools-pin-check.{sh,ps1} to scan scripts/,
  # infra/scripts/, tools/, and .github/workflows/ for invocations
  # of jq/curl/openssl/base64/sha256sum/apt-get/brew/pip/pip3/npm
  # that are not pinned in tools/PINS.toml. Exits 1 if any are
  # found. The PowerShell twin runs alongside on the same ubuntu
  # runner to catch drift between the two implementations.
  #
  # Companion to docs/CI-TOOLS.md (the policy doc). Companion to
  # tools/install-pinned.{sh,ps1} (the installer — used by
  # operators to apply PINS.toml changes).
  # ---------------------------------------------------------------------------
  ci-tools-pin-check:
    name: CI tools — version pinning (STRIDE-8-03)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validator (bash)
        # ubuntu-latest runners ship bash 5.x — no extra install
        # needed. The script uses python3 for the comment-stripping
        # pass; that is also preinstalled on ubuntu-latest.
        run: bash tools/ci-tools-pin-check.sh

      - name: Run validator (PowerShell twin)
        # ubuntu-latest runners ship PowerShell 7 (pwsh) as
        # /usr/bin/pwsh. Running both validators on the same job
        # catches drift between the two implementations. The
        # validator file itself is excluded by default; the .ps1
        # twin's `Self` switch is not used here because the .ps1
        # file is excluded via filename pattern, not via the
        # self-skip logic.
        shell: pwsh
        run: pwsh tools/ci-tools-pin-check.ps1

  # ---------------------------------------------------------------------------
  # Schemas (JSON Schema validation)
  # ---------------------------------------------------------------------------
  schemas-validate:
    name: Schemas — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5

      - name: Validate schemas
        run: |
          for schema in shared/schemas/*.schema.json; do
            echo "Validating $schema..."
            ajv compile -s "$schema" --spec=draft2020 || exit 1
          done

  # ---------------------------------------------------------------------------
  # Docs (markdown lint)
  # ---------------------------------------------------------------------------
  docs-lint:
    name: Docs — markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
          config: |
            {
              "default": true,
              "MD013": false,
              "MD024": { "siblings_only": true },
              "MD041": false
            }
