name: ios-build

# ============================================================================
# Sprint 8 Item 1 — PR-MP-CI (GitHub Actions multi-OS matrix)
# ----------------------------------------------------------------------------
# Sprint 3 carry-over: bring the iOS workflow to a fully multi-OS matrix
# with OS-specific caching. The matrix was first wired by Sprint 7 Item 7
# (STRIDE-8-01) which added the macos-latest xcodebuild leg; this PR
# formalises the full 3-OS treatment as the Sprint 8 PR-MP-CI deliverable.
#
# Per-OS coverage (see docs/CI-MATRIX.md §"Workflow → Runner → Step matrix"
# for the authoritative runner → step mapping):
#
#   * ubuntu-latest   — static checks (Podfile Ruby syntax + XML plists
#                       + project.pbxproj NeXTSTEP anchors); caches the
#                       Flutter pub-cache and the cross-platform Flutter
#                       build dir (mobile/build).
#   * macos-latest    — full xcodebuild build + xcodebuild test (iOS
#                       Simulator, Debug config, no signing); caches the
#                       Darwin-only SwiftPM managed cache and CocoaPods
#                       install output.
#   * windows-latest  — static checks (Podfile Ruby syntax + XML plists
#                       + project.pbxproj NeXTSTEP anchors) via
#                       PowerShell-friendly bash; caches the gradle
#                       cache (Android-adjacent cross-platform coverage
#                       for any future Android-graded iOS PR; no docker
#                       on this leg — see CI-MATRIX.md §4).
#
# xcodebuild is Darwin-only. Non-macOS legs fail-fast no-op the
# xcodebuild steps via `if: matrix.os == 'macos-latest'` and instead
# run cross-platform static validation. All three surface paths are
# OS-agnostic except where flagged.
#
# Caching — OS-specific, all per `actions/cache@v4`:
#   - ubuntu:  ~/.pub-cache + mobile/build  (key on pubspec.lock)
#   - macos:   ~/Library/Caches/org.swift.swiftpm + mobile/ios/Pods
#              (key on Podfile.lock + **/Package.resolved, restore-keys
#              fallback to looser prefix match)
#   - windows: ~\.gradle\caches             (key on **/build.gradle*)
#
# fail-fast: false — one OS failing must not block the other two. This
# is the same posture as the .github/workflows/ci.yml multi-OS matrix
# (Sprint 3 PR-MP-CI), and matches the canonical guidance in
# docs/CI-MATRIX.md §6 ("Update protocol — Adding a runner").
#
# Cross-references:
#   - docs/CI-MATRIX.md         (canonical runner → step mapping)
#   - ADR-0008-multiplatform-tooling.md §"Per-OS Matrix"
#   - docs/MULTIPLATFORM.md     §"Windows" (manual verify path)
#   - Sprint 7 Item 7 STRIDE-8-01 (cyber-security hand-off — macOS
#     xcodebuild leg introduced)
#
# Push YAPILMADI — branch-only hand-off to verifier (Sprint 8 §"Push
# kararı: §8 user/Architect onayı sonrası").
# ============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  ios-build:
    name: iOS — build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Three runners — each does what it CAN build. macOS does the
        # real xcodebuild leg; the others run static cross-platform
        # validation in lieu of an actual build. See the per-step
        # `if:` guards below.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      # ---------------------------------------------------------------------
      # Cross-OS Flutter pub cache — runs on all 3 legs.
      # ~/.pub-cache is the Flutter package cache, .dart_tool holds the
      # per-package build artifacts. Sprint 8 PR-MP-CI extension: also
      # caches `mobile/build` (cross-platform Flutter build output) so
      # the ubuntu and macos legs share Flutter incremental build state
      # across runs.
      # ---------------------------------------------------------------------

      - name: Cache pub + mobile/build (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/build
          key: ${{ runner.os }}-pub-build-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-build-

      - name: Cache pub (macos)
        # macOS gets a separate pub-cache step so the cache key prefix
        # is `Darwin-pub-…` (matches actions/cache namespace convention
        # where prefix is runner.os). The mobile/build dir is NOT
        # cached here because on macOS the more valuable caches are
        # the SwiftPM + Pods caches below — the macOS pod install
        # rewrites mobile/ios/Flutter/Generated.xcconfig and
        # `mobile/build` is dominated by xcodebuild intermediates that
        # are themselves cached by Xcode's derived-data path.
        if: matrix.os == 'macos-latest'
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache pub (windows)
        if: matrix.os == 'windows-latest'
        # ~\.pub-cache is the Flutter package cache on Windows runners
        # (the literal path expansion differs from POSIX runners — the
        # cache action resolves `~/.pub-cache` per-runner). .dart_tool
        # is the per-package build artifact dir; cache it too.
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter deps
        # `flutter pub get` writes `mobile/ios/Flutter/Generated.xcconfig`
        # which the Podfile requires before `pod install` can succeed.
        # This MUST run before pod install on macOS, and before any
        # iOS lint on the other legs.
        working-directory: mobile
        run: flutter pub get

      # ---------------------------------------------------------------------
      # macOS-only caching — SwiftPM managed cache + CocoaPods install dir.
      # `~/Library/Caches/org.swift.swiftpm` is a Darwin path (the SwiftPM
      # managed cache lives there on macOS only); guarding on
      # matrix.os == 'macos-latest' avoids spurious "path not found"
      # diagnostics on Linux/Windows runners.
      # ---------------------------------------------------------------------

      - name: Restore SwiftPM + CocoaPods cache
        id: ios-cache
        if: matrix.os == 'macos-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            mobile/ios/Pods
          key: ${{ runner.os }}-swiftpm-pods-${{ hashFiles('mobile/ios/Podfile.lock', '**/Package.resolved') }}
          # Fallback to a looser prefix match when an exact key (built
          # from Podfile.lock / Package.resolved hashes) is missing.
          # Useful when Podfile.lock is regenerated locally without
          # changing the dependency set.
          restore-keys: |
            ${{ runner.os }}-swiftpm-pods-

      - name: Log SwiftPM + Pods cache hit/miss
        if: matrix.os == 'macos-latest'
        # Read the cache step's hit / primary-key / restored-key outputs.
        # `cache-hit` is true only on an EXACT key match; `cache-matched-key`
        # records whether restore-keys found a fallback.
        run: |
          echo "::group::iOS macOS cache hit/miss log"
          echo "Requested key:        ${{ steps.ios-cache.key }}"
          echo "Cache primary key:    ${{ steps.ios-cache.cache-primary-key }}"
          echo "Cache restored key:   ${{ steps.ios-cache.cache-restored-key }}"
          echo "Cache exact hit:      ${{ steps.ios-cache.cache-hit }}"
          if [ -d "$HOME/Library/Caches/org.swift.swiftpm" ]; then
            echo "swiftpm cache:  HIT  ($(du -sh "$HOME/Library/Caches/org.swift.swiftpm" 2>/dev/null | cut -f1))"
          else
            echo "swiftpm cache:  MISS — first build will populate it"
          fi
          if [ -d "mobile/ios/Pods" ]; then
            echo "Pods cache:     HIT  ($(du -sh "mobile/ios/Pods" 2>/dev/null | cut -f1))"
          else
            echo "Pods cache:     MISS — pod install will populate it"
          fi
          echo "::endgroup::"

      # ---------------------------------------------------------------------
      # Windows-only caching — Gradle cache.
      # ~\.gradle\caches is the Gradle dependency + build cache on
      # Windows runners. Even though ios.yml is iOS-priority, the
      # Flutter Android target shares the same Gradle daemon —
      # caching here keeps the Windows static-check leg warm for any
      # future Android-graded iOS PR. No docker on this leg (see
      # CI-MATRIX.md §4).
      # ---------------------------------------------------------------------

      - name: Restore Gradle cache (windows)
        id: gradle-cache
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\.gradle\caches
          # Key on Gradle build files. mobile/android/build.gradle* and
          # mobile/android/app/build.gradle* (Flutter convention) are
          # the dependency declaration entry points; mobile/android/
          # settings.gradle* locks the plugin set.
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle*', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Log Gradle cache hit/miss (windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "::group::Windows Gradle cache hit/miss log"
          echo "Requested key:        ${{ steps.gradle-cache.key }}"
          echo "Cache primary key:    ${{ steps.gradle-cache.cache-primary-key }}"
          echo "Cache restored key:   ${{ steps.gradle-cache.cache-restored-key }}"
          echo "Cache exact hit:      ${{ steps.gradle-cache.cache-hit }}"
          if (Test-Path "$env:USERPROFILE\.gradle\caches") {
            $size = (Get-ChildItem "$env:USERPROFILE\.gradle\caches" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
            if ($size) {
              $sizeMb = [math]::Round($size / 1MB, 1)
              Write-Host "gradle cache:  HIT  ($sizeMb MB)"
            } else {
              Write-Host "gradle cache:  HIT  (empty)"
            }
          } else {
            Write-Host "gradle cache:  MISS — first build will populate it"
          }
          echo "::endgroup::"

      # ---------------------------------------------------------------------
      # xcodebuild path — macOS only.
      # - `if: matrix.os == 'macos-latest'` gates the entire step.
      # - `continue-on-error: false` (GitHub Actions default, but spelled
      #   out for cyber-security/verifier clarity): any xcodebuild
      #   failure fails the workflow.
      # - `CODE_SIGNING_*` are required because GitHub-hosted macOS
      #   runners have no signing identity. Building for Simulator
      #   so we don't need device certs.
      # ---------------------------------------------------------------------

      - name: CocoaPods install (macOS only)
        if: matrix.os == 'macos-latest'
        working-directory: mobile/ios
        continue-on-error: false
        run: |
          set -o pipefail
          pod install

      - name: Save SwiftPM + CocoaPods cache (post-install)
        # Save AFTER pod install so the cache captures freshly
        # resolved Pods even on a cache miss. `always()` so a
        # subsequent build failure still preserves the cache for
        # the next run.
        if: matrix.os == 'macos-latest' && always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            mobile/ios/Pods
          key: ${{ runner.os }}-swiftpm-pods-${{ hashFiles('mobile/ios/Podfile.lock', '**/Package.resolved') }}

      - name: xcodebuild build + test (macOS only)
        if: matrix.os == 'macos-latest'
        working-directory: mobile/ios
        continue-on-error: false
        # Use `set -o pipefail` so `xcodebuild ... | xcpretty` (or any
        # piped post-processor) failing the parse still surfaces as an
        # error.
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build test

      # ---------------------------------------------------------------------
      # Static validation — Linux + Windows legs.
      # xcodebuild is Darwin-only, but there IS cross-platform static
      # validation we can do. Failing here surfaces project.pbxproj /
      # Podfile / Info.plist regressions on PRs without needing a
      # Mac runner (which is the bottleneck runner in the GHA quota).
      # ---------------------------------------------------------------------

      - name: Static iOS sanity (non-macOS)
        if: matrix.os != 'macos-latest'
        working-directory: mobile/ios
        run: |
          set -e
          echo "::group::Static iOS sanity (no xcodebuild — non-Darwin runner)"

          # Podfile Ruby syntax — works wherever ruby is on PATH.
          # GitHub-hosted ubuntu/windows runners ship ruby.
          if command -v ruby >/dev/null 2>&1; then
            ruby -c Podfile
          else
            echo "WARN: ruby not on PATH, skipping Podfile syntax check"
          fi

          # All .plist files EXCEPT project.pbxproj — plistlib
          # handles XML and binary plist. project.pbxproj is
          # NeXTSTEP ASCII plist (an Apple format) which plistlib
          # can't parse; treat it as a separate text sanity check.
          python - <<'PY'
          import glob, plistlib, sys
          failures = []
          for p in sorted(glob.glob('**/*.plist', recursive=True)):
              try:
                  with open(p, 'rb') as f:
                      d = plistlib.load(f)
                  keys_preview = ','.join(sorted(d.keys())[:6])
                  print(f'{p}: OK ({keys_preview}...)')
              except Exception as e:
                  if 'Runner.xcodeproj' in p:
                      print(f'{p}: SKIP (NeXTSTEP ASCII plist, plistlib not supported)')
                      continue
                  print(f'ERROR: {p}: {e}', file=sys.stderr)
                  failures.append((p, str(e)))
          if failures:
              sys.exit(1)
          PY

          # project.pbxproj is NeXTSTEP ASCII plist — text-only
          # sanity. Check for the structural anchors.
          python - <<'PY'
          import sys
          p = 'Runner.xcodeproj/project.pbxproj'
          with open(p, encoding='utf-8') as f:
              content = f.read()
          if 'PBXProject' not in content:
              print(f'ERROR: {p} missing PBXProject root anchor', file=sys.stderr)
              sys.exit(1)
          if 'objects' not in content:
              print(f'ERROR: {p} missing objects section', file=sys.stderr)
              sys.exit(1)
          if 'archiveVersion' not in content:
              print(f'WARN: {p} missing archiveVersion (Apple Xcodeproj format drift?)')
          print(f'{p}: OK (PBXProject + objects anchors present)')
          PY

          echo "::endgroup::"